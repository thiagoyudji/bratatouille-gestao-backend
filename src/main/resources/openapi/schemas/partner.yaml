CreatePartnerRequest:
  type: object
  required:
    - name
    - defaultSplitPercentage
  properties:
    name:
      type: string
    defaultSplitPercentage:
      type: number
    roles:
      type: array
      uniqueItems: true
      items:
        type: string
        enum:
          - ADMIN
          - PRODUCER
          - VIEWER
          - EDITOR

PartnerResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    active:
      type: boolean
    defaultSplitPercentage:
      type: number
    createdAt:
      type: string
      format: date-time
    roles:
      type: array
      uniqueItems: true
      items:
        type: string
        enum:
          - ADMIN
          - PRODUCER
          - VIEWER
          - EDITOR