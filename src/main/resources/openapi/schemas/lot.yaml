LotResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    productionId:
      type: integer
      format: int64
    itemId:
      type: integer
      format: int64
    itemName:
      type: string
    productionDate:
      type: string
      format: date
    expirationDate:
      type: string
      format: date
    quantity:
      type: number
    createdAt:
      type: string
      format: date-time