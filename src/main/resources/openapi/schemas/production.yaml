ProductionCreateRequest:
  type: object
  required:
    - recipeId
    - producedQuantity
  properties:
    recipeId:
      type: integer
      format: int64
    producedQuantity:
      type: number

ProductionItemResponse:
  type: object
  properties:
    itemId:
      type: integer
      format: int64
    itemName:
      type: string
    consumedQuantity:
      type: number
    usableQuantity:
      type: number
    lossQuantity:
      type: number
    yieldPercentage:
      type: number
    unitCost:
      type: number
    totalCost:
      type: number

ProductionResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    recipeId:
      type: integer
      format: int64
    recipeName:
      type: string
    outputItemId:
      type: integer
      format: int64
    outputItemName:
      type: string
    productionDate:
      type: string
      format: date
    producedQuantity:
      type: number
    totalCost:
      type: number
    unitCost:
      type: number
    lotId:
      type: integer
      format: int64
    lotExpirationDate:
      type: string
      format: date
    items:
      type: array
      items:
        $ref: '#/ProductionItemResponse'
    createdAt:
      type: string
      format: date-time