ProductionSimulationItemResponse:
  type: object
  properties:
    itemId:
      type: integer
      format: int64
    itemName:
      type: string
    requiredQuantity:
      type: number
    usableQuantity:
      type: number
    lossQuantity:
      type: number
    yieldPercentage:
      type: number
    currentStock:
      type: number
    missingQuantity:
      type: number
    unitCost:
      type: number
    totalCost:
      type: number

ProductionSimulationResponse:
  type: object
  properties:
    recipeId:
      type: integer
      format: int64
    recipeName:
      type: string
    outputItemId:
      type: integer
      format: int64
    outputItemName:
      type: string
    quantity:
      type: number
    estimatedTotalCost:
      type: number
    items:
      type: array
      items:
        $ref: '#/ProductionSimulationItemResponse'