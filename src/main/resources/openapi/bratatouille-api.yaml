openapi: 3.0.3
info:
  title: Bratatouille Management API
  version: 1.0.0

paths:
  /api/stocks:
    $ref: './paths/stocks.yaml#/stocks'
  /api/stocks/{itemId}:
    $ref: './paths/stocks.yaml#/stockByItemId'
  /api/stocks/{itemId}/adjust:
    $ref: './paths/stocks.yaml#/adjustStock'
  /api/stocks/movements:
    $ref: './paths/stocks.yaml#/stockMovements'

  /api/financial/balances:
    $ref: './paths/financial.yaml#/balances'
  /api/financial/pix-settlement:
    $ref: './paths/financial.yaml#/pixSettlement'

  /api/partners:
    $ref: './paths/partners.yaml#/partners'
  /api/partners/{id}:
    $ref: './paths/partners.yaml#/partnerById'

  /api/items:
    $ref: './paths/items.yaml#/items'
  /api/items/{id}:
    $ref: './paths/items.yaml#/itemById'

  /api/purchases:
    $ref: './paths/purchases.yaml#/purchases'
  /api/purchases/{id}:
    $ref: './paths/purchases.yaml#/purchaseById'

  /api/productions:
    $ref: './paths/productions.yaml#/productions'
  /api/productions/{id}:
    $ref: './paths/productions.yaml#/productionById'

  /api/recipes:
    $ref: './paths/recipes.yaml#/recipes'
  /api/recipes/{id}:
    $ref: './paths/recipes.yaml#/recipeById'
  /api/recipes/{id}/activate:
    $ref: './paths/recipes.yaml#/activateRecipe'
  /api/recipes/{id}/deactivate:
    $ref: './paths/recipes.yaml#/deactivateRecipe'

  /api/sellable-stocks:
    $ref: './paths/sellable-stocks.yaml#/sellableStocks'
  /api/sellable-stocks/{itemId}:
    $ref: './paths/sellable-stocks.yaml#/sellableStockByItemId'

  /api/sales-orders:
    $ref: './paths/sales-orders.yaml#/salesOrders'
  /api/sales-orders/{id}:
    $ref: './paths/sales-orders.yaml#/salesOrderById'

  /api/sales-reports/summary:
    $ref: './paths/sales-reports.yaml#/salesSummary'
  /api/sales-reports/products:
    $ref: './paths/sales-reports.yaml#/salesProductPerformance'

  /api/operational-losses:
    $ref: './paths/operational-losses.yaml#/operationalLosses'
  /api/operational-losses/{id}:
    $ref: './paths/operational-losses.yaml#/operationalLossById'

  /api/production-simulation:
    $ref: './paths/production-simulation.yaml#/productionSimulation'

components:
  schemas:
    StockResponse:
      $ref: './schemas/stock.yaml#/StockResponse'
    AdjustStockRequest:
      $ref: './schemas/stock.yaml#/AdjustStockRequest'
    StockMovementResponse:
      $ref: './schemas/stock.yaml#/StockMovementResponse'

    PartnerBalanceResponse:
      $ref: './schemas/financial.yaml#/PartnerBalanceResponse'
    PixSettlementResponse:
      $ref: './schemas/financial.yaml#/PixSettlementResponse'

    CreatePartnerRequest:
      $ref: './schemas/partner.yaml#/CreatePartnerRequest'
    PartnerResponse:
      $ref: './schemas/partner.yaml#/PartnerResponse'

    CreateItemRequest:
      $ref: './schemas/item.yaml#/CreateItemRequest'
    ItemResponse:
      $ref: './schemas/item.yaml#/ItemResponse'

    PurchaseCreateRequest:
      $ref: './schemas/purchase.yaml#/PurchaseCreateRequest'
    PurchaseItemRequest:
      $ref: './schemas/purchase.yaml#/PurchaseItemRequest'
    PurchaseSplitRequest:
      $ref: './schemas/purchase.yaml#/PurchaseSplitRequest'
    PurchaseResponse:
      $ref: './schemas/purchase.yaml#/PurchaseResponse'
    PurchaseItemResponse:
      $ref: './schemas/purchase.yaml#/PurchaseItemResponse'
    PurchaseSplitResponse:
      $ref: './schemas/purchase.yaml#/PurchaseSplitResponse'

    ProductionCreateRequest:
      $ref: './schemas/production.yaml#/ProductionCreateRequest'
    ProductionResponse:
      $ref: './schemas/production.yaml#/ProductionResponse'
    ProductionItemResponse:
      $ref: './schemas/production.yaml#/ProductionItemResponse'

    RecipeItemRequest:
      $ref: './schemas/recipe.yaml#/RecipeItemRequest'
    RecipeCreateRequest:
      $ref: './schemas/recipe.yaml#/RecipeCreateRequest'
    RecipeUpdateRequest:
      $ref: './schemas/recipe.yaml#/RecipeUpdateRequest'
    RecipeItemResponse:
      $ref: './schemas/recipe.yaml#/RecipeItemResponse'
    RecipeResponse:
      $ref: './schemas/recipe.yaml#/RecipeResponse'

    SellableStockUpsertRequest:
      $ref: './schemas/sellable-stock.yaml#/SellableStockUpsertRequest'
    SellableStockResponse:
      $ref: './schemas/sellable-stock.yaml#/SellableStockResponse'

    SalesOrderCreateRequest:
      $ref: './schemas/sales-order.yaml#/SalesOrderCreateRequest'
    SalesOrderItemRequest:
      $ref: './schemas/sales-order.yaml#/SalesOrderItemRequest'
    SalesOrderResponse:
      $ref: './schemas/sales-order.yaml#/SalesOrderResponse'
    SalesOrderItemResponse:
      $ref: './schemas/sales-order.yaml#/SalesOrderItemResponse'

    SalesSummaryResponse:
      $ref: './schemas/sales-report.yaml#/SalesSummaryResponse'
    SalesProductPerformanceResponse:
      $ref: './schemas/sales-report.yaml#/SalesProductPerformanceResponse'

    OperationalLossCreateRequest:
      $ref: './schemas/operational-loss.yaml#/OperationalLossCreateRequest'
    OperationalLossResponse:
      $ref: './schemas/operational-loss.yaml#/OperationalLossResponse'

    ProductionSimulationItemResponse:
      $ref: './schemas/production-simulation.yaml#/ProductionSimulationItemResponse'
    ProductionSimulationResponse:
      $ref: './schemas/production-simulation.yaml#/ProductionSimulationResponse'